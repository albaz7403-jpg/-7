<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>موقعي — مازن علي بن علي الجيلاني</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">
  <div class="doc-frame">
    <header class="doc-header small">
      <div class="container header-row">
        <div class="center">
          <h1>موقعي على الخريطة</h1>
        </div>
        <div class="right">
          <a href="index.html" class="back-link">العودة للسيرة</a>
        </div>
      </div>
    </header>

    <main class="container doc-body">
      <section class="card location-card">
        <h2>العنوان والموقع الجغرافي</h2>

        <p contenteditable="true"><strong>العنوان:</strong> مديرية الضالع، محافظة الضالع، اليمن</p>

        <p>
          <!-- رابط يفتح تطبيق الخرائط على الأجهزة الداعمة -->
          <a class="map-link" href="geo:13.779863,44.709854" onclick="openMaps(event, 13.779863, 44.709854)">
            افتح الموقع في تطبيق الخرائط
          </a>
          &nbsp;·&nbsp;
          <!-- رابط احتياطي يفتح Google Maps في نافذة جديدة -->
          <a href="https://www.google.com/maps?q=13.779863,44.709854" target="_blank" rel="noopener">عرض على خرائط Google</a>
        </p>

        <div class="map-embed">
          <!-- تضمين خريطة Google داخل الصفحة -->
          <iframe
            src="https://www.google.com/maps?q=13.779863,44.709854&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            width="100%"
            height="360"
            style="border:0;border-radius:8px;"
            allowfullscreen
            aria-hidden="false"></iframe>
        </div>

        <p class="muted" style="margin-top:12px;color:var(--muted);">
      
        </p>
      </section>
    </main>

    <footer class="doc-footer">
      <div class="container">
        <p></p>
      </div>
    </footer>
  </div>
